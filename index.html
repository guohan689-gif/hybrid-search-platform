<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>句子向量相似度计算平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .calculate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .calculate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #f5f5f5;
            color: #666;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .result-section {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .similarity-score {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            position: relative;
        }

        .score-label {
            font-size: 18px;
            color: #666;
            margin-top: 10px;
        }

        .reasons-section {
            margin-top: 30px;
        }

        .reasons-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .reason-item {
            padding: 12px 15px;
            background: white;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 5px;
            color: #555;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            margin-top: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 句子向量相似度分析</h1>
        <p class="subtitle">基于TF-IDF和余弦相似度的智能文本分析平台</p>

        <div class="input-section">
            <div class="input-group">
                <label for="sentence1">句子 1</label>
                <textarea id="sentence1" placeholder="请输入第一个句子..."></textarea>
            </div>

            <div class="input-group">
                <label for="sentence2">句子 2</label>
                <textarea id="sentence2" placeholder="请输入第二个句子..."></textarea>
            </div>

            <div class="button-group">
                <button class="calculate-btn" onclick="calculateSimilarity()">计算相似度</button>
                <button class="clear-btn" onclick="clearAll()">清空</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            正在计算中...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="result" class="result-section">
            <div class="similarity-score">
                <div id="scoreCircle" class="score-circle"></div>
                <div class="score-label">相似度得分</div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="length1">0</div>
                    <div class="stat-label">句子1长度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="length2">0</div>
                    <div class="stat-label">句子2长度</div>
                </div>
            </div>

            <div class="reasons-section">
                <div class="reasons-title">📊 分析结果</div>
                <div id="reasons"></div>
            </div>
        </div>
    </div>

    <script>
        async function calculateSimilarity() {
            const sentence1 = document.getElementById('sentence1').value.trim();
            const sentence2 = document.getElementById('sentence2').value.trim();

            // 验证输入
            if (!sentence1 || !sentence2) {
                showError('请输入两个句子');
                return;
            }

            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').classList.remove('show');

            try {
                const response = await fetch('http://localhost:5000/api/similarity', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sentence1, sentence2 })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '计算失败');
                }

                displayResult(data);
            } catch (error) {
                showError('连接服务器失败，请确保后端服务正在运行 (python backend.py)');
                console.error(error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResult(data) {
            const resultSection = document.getElementById('result');
            const scoreCircle = document.getElementById('scoreCircle');
            const reasonsDiv = document.getElementById('reasons');

            // 设置相似度分数和颜色
            const score = data.similarity;
            scoreCircle.textContent = data.percentage;
            
            let color;
            if (score > 0.8) color = '#10b981';
            else if (score > 0.5) color = '#f59e0b';
            else if (score > 0.2) color = '#ef4444';
            else color = '#6b7280';
            
            scoreCircle.style.background = `linear-gradient(135deg, ${color} 0%, ${color}dd 100%)`;

            // 设置统计信息
            document.getElementById('length1').textContent = data.sentence1_length;
            document.getElementById('length2').textContent = data.sentence2_length;

            // 显示原因
            reasonsDiv.innerHTML = data.reasons.map(reason => 
                `<div class="reason-item">${reason}</div>`
            ).join('');

            // 显示结果区域
            resultSection.classList.add('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function clearAll() {
            document.getElementById('sentence1').value = '';
            document.getElementById('sentence2').value = '';
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').style.display = 'none';
        }

        // 回车键快捷计算
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                calculateSimilarity();
            }
        });
    </script>
</body>
</html>
